<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data Display - Epilepsy Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .sensor-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .sensor-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sensor-value {
            font-size: 24px;
            font-weight: bold;
        }

        .status {
            text-align: center;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-top: 20px;
        }

        .status.ok {
            background: #4caf50;
            color: white;
        }

        .status.error {
            background: #f44336;
            color: white;
        }

        .error-message {
            color: #f44336;
            margin-top: 10px;
            padding: 10px;
            background: #ffebee;
            border-radius: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Epilepsy Detection - Sensor Monitor</h1>
        
        <div class="sensor-grid">
            <div class="sensor-card">
                <div class="sensor-label">EMG 1</div>
                <div class="sensor-value" id="emg1">0.00</div>
            </div>
            
            <div class="sensor-card">
                <div class="sensor-label">EMG 2</div>
                <div class="sensor-value" id="emg2">0.00</div>
            </div>
            
            <div class="sensor-card">
                <div class="sensor-label">IMU</div>
                <div class="sensor-value" id="imu" style="font-size: 14px;">ax:0, ay:0, az:0</div>
            </div>
            
            <div class="sensor-card">
                <div class="sensor-label">PPG (Heart Rate)</div>
                <div class="sensor-value" id="ppg">0</div>
            </div>
        </div>

        <div class="status" id="status">Status: Connecting...</div>
        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        /**
         * FIXED VERSION: Fetches sensor data with proper error handling
         * - Handles null/undefined values gracefully
         * - Prevents JavaScript runtime errors
         * - Shows user-friendly error messages
         */
        async function fetchSensorData() {
            try {
                const response = await fetch("/get_sensor_data");
                
                // Check if response is OK
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON response
                const data = await response.json();

                // Validate data structure exists
                if (!data || typeof data !== 'object') {
                    throw new Error("Invalid data format received");
                }

                // Update EMG1 with null coalescing and fallback
                const emg1Element = document.getElementById("emg1");
                if (emg1Element) {
                    emg1Element.textContent = (data.emg1 ?? 0).toFixed(2);
                }

                // Update EMG2 with null coalescing and fallback
                const emg2Element = document.getElementById("emg2");
                if (emg2Element) {
                    emg2Element.textContent = (data.emg2 ?? 0).toFixed(2);
                }

                // Update PPG with null coalescing and fallback
                const ppgElement = document.getElementById("ppg");
                if (ppgElement) {
                    ppgElement.textContent = data.ppg ?? 0;
                }

                // Update IMU - handle nested object safely
                const imuElement = document.getElementById("imu");
                if (imuElement) {
                    const imu = data.imu || {};
                    const ax = imu.ax ?? 0;
                    const ay = imu.ay ?? 0;
                    const az = imu.az ?? 0;
                    imuElement.textContent = `ax:${ax.toFixed(2)}, ay:${ay.toFixed(2)}, az:${az.toFixed(2)}`;
                }

                // Update status
                const statusElement = document.getElementById("status");
                if (statusElement) {
                    statusElement.textContent = `Status: ${data.status || "ok"}`;
                    statusElement.className = `status ${data.status === "ok" ? "ok" : ""}`;
                }

                // Hide error message on success
                const errorElement = document.getElementById("errorMessage");
                if (errorElement) {
                    errorElement.classList.remove("show");
                    errorElement.textContent = "";
                }

            } catch (err) {
                console.error("Fetch failed:", err);
                
                // Show user-friendly error message
                const errorElement = document.getElementById("errorMessage");
                if (errorElement) {
                    errorElement.textContent = `Error: ${err.message}. Retrying...`;
                    errorElement.classList.add("show");
                }

                // Update status to show error
                const statusElement = document.getElementById("status");
                if (statusElement) {
                    statusElement.textContent = "Status: Error - Check connection";
                    statusElement.className = "status error";
                }

                // Set default values on error
                document.getElementById("emg1").textContent = "0.00";
                document.getElementById("emg2").textContent = "0.00";
                document.getElementById("ppg").textContent = "0";
                document.getElementById("imu").textContent = "ax:0, ay:0, az:0";
            }
        }

        // Start fetching sensor data every second
        setInterval(fetchSensorData, 1000);
        
        // Fetch immediately on page load
        fetchSensorData();
    </script>
</body>
</html>
